<h1>Register</h1>

{% if error %}<p style="color:red">{{ error }}</p>{% endif %}

<form method="post">
    {% csrf_token %}
    <p>Username: <input type="text" name="username"></p>
    <p>Password: <input type="password" name="password"></p>
    <button type="submit">Register</button>
</form>

<p><a href="{% url 'polls:login' %}">Login</a></p>
